<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Detalle Servicio</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>


<body>
    <!-- NAVBAR que ahora implementamos desde fragmento -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="servicio">
        <div class="detalle">
            <h1 th:text="${servicio.nombre}"></h1>
            <img th:src="${servicio.imagenUrl}">
            <div class="detalle-descripcion">
                <!-- Resumen corto -->
                <p th:text="${servicio.descripcion}"></p>
                <!-- Descripción detallada (campo usado en el repositorio) -->
                <p th:text="${servicio.descripcionDetallada}"></p>
            </div>
            <p class="detalle-precio"
                th:text="${'$' + #numbers.formatDecimal(servicio.precio, 0, 'POINT', 0, 'COMMA')}"></p>
            <a class="btn detalle-btn" href="">Adquierelo ahora</a>
        </div>
    </div>

    <!-- FOOTER que ahora implementamos desde fragmento -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
