<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Servicios</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div class="container">
        <h1>Servicios</h1>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Accion</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="servicio : ${servicios}">
                    <td th:text="${servicio.id}"></td>
                    <td th:text="${servicio.nombre}"></td>
                    <td th:text="${#numbers.formatCurrency(servicio.precio)}"></td>
                    <td>
                        <a class="btn-gold" th:href="@{'/servicios/' + ${servicio.id}}">
                            Ver
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
