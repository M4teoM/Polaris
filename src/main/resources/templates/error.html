<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Hotel Polaris</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .error-container {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 1rem;
        }
        .error-icon { font-size: 5rem; margin-bottom: 1rem; }
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: #c9a84c;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .error-titulo {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }
        .error-descripcion {
            font-size: 1.1rem;
            color: #666;
            max-width: 500px;
            margin-bottom: 0.5rem;
        }
        .error-uri {
            font-size: 0.85rem;
            color: #999;
            font-family: monospace;
            background: #f5f5f5;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            margin-bottom: 2rem;
        }
        .btn-volver {
            background: #c9a84c;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s;
            margin: 0.5rem;
            display: inline-block;
        }
        .btn-volver:hover { background: #b8943d; }
        .btn-outline {
            background: transparent;
            color: #1a1a2e;
            border: 2px solid #1a1a2e;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            margin: 0.5rem;
            display: inline-block;
        }
        .btn-outline:hover { background: #1a1a2e; color: white; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="error-container">
        <div class="error-icon" th:text="${icono}">⚠️</div>
        <div class="error-code" th:text="${codigo}">500</div>
        <h1 class="error-titulo" th:text="${titulo}">Error</h1>
        <p class="error-descripcion" th:text="${descripcion}">Algo salió mal.</p>
        <div class="error-uri" th:if="${uri}" th:text="'Ruta: ' + ${uri}"></div>
        <div>
            <a href="javascript:history.back()" class="btn-outline">← Volver</a>
            <a th:href="@{/}" class="btn-volver">🏠 Ir al inicio</a>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
