<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Servicios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>


<body>
    <!-- NAVBAR implementao desde fragmento -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid page-section">
        <div class="table-header-box">
            <div class="header-text">
                <h1 class="premium-title">Catálogo de Servicios</h1>
                <p class="subtitle">Gestión y consulta de experiencias exclusivas Polaris.</p>
            </div>
            <div class="header-actions">
                <a class="btn-outline" th:href="@{/servicios/cards}">
                    <i class="icon-grid"></i> Ver como Tarjetas
                </a>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="polaris-table">
                <thead>
                    <tr>
                        <th><i class="icon-label"></i> Nombre del Servicio</th>
                        <th><i class="icon-tag"></i> Precio</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="servicio : ${servicios}">
                        <td class="font-bold" th:text="${servicio.nombre}"></td>
                        <td class="price-cell"
                            th:text="${'$' + #numbers.formatDecimal(servicio.precio, 0, 'POINT', 0, 'COMMA')}"></td>
                        <td class="text-center">
                            <a class="btn-table-action" th:href="@{'/servicios/' + ${servicio.id}}">
                                Ver Detalles
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- TABLA BOOTSTRAP -->
    <h1 class="text-center mt-5">bootstrap</h1>
    <div class="container mt-5 pt-5">
        <h1 class="text-primary border-bottom pb-2">Catálogo de Servicios</h1>
        <table class="table table-hover table-striped mt-4 shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="servicio : ${servicios}">
                    <td class="align-middle fw-bold" th:text="${servicio.nombre}"></td>
                    <td class="align-middle text-success"
                        th:text="${'$' + #numbers.formatDecimal(servicio.precio, 0, 'POINT', 0, 'COMMA')}"></td>
                    <td class="text-center">
                        <a class="btn btn-outline-primary btn-sm"
                            th:href="@{'/servicios/' + ${servicio.id}}">Detalles</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- FOOTER implementao desde fragmento -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
