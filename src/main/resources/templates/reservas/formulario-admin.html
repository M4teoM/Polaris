<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Reserva | Admin Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .form-page {
            min-height: 100vh;
            background: #f4f7fb;
            padding: 120px 0 80px;
        }

        .form-card {
            max-width: 760px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.09);
            overflow: hidden;
        }

        .form-card-header {
            background: linear-gradient(135deg, #0a1628, #1a2a4a);
            padding: 36px 40px;
        }

        .form-card-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .form-card-header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .form-card-body {
            padding: 36px 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        @media(max-width:680px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-field label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            color: #0a1628;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-field input,
        .form-field select {
            padding: 12px 16px;
            border: 2px solid #e8edf5;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: #0a1628;
            background: #fafbff;
            transition: border-color 0.3s;
            outline: none;
        }

        .form-field input:focus,
        .form-field select:focus {
            border-color: #2ec4b6;
            background: #fff;
        }

        .tipo-hint {
            margin-top: 4px;
            font-family: 'Montserrat', sans-serif;
            color: #667;
            font-size: 0.78rem;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn-guardar {
            background: #D4AF37;
            color: #0a1628;
            padding: 13px 32px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .btn-guardar:hover {
            background: #2ec4b6;
        }

        .btn-cancelar {
            background: #f0f4ff;
            color: #0a1628;
            padding: 13px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .btn-cancelar:hover {
            background: #e0e6f0;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="form-page">
        <div class="form-card">
            <div class="form-card-header">
                <h1>Nueva Reserva (Admin)</h1>
                <p>Seleccione cliente y tipo de habitacion para registrar una nueva reserva</p>
            </div>

            <div class="form-card-body">
                <form th:action="@{/reservas/nueva/admin}" method="post">
                    <div class="form-row">
                        <div class="form-field">
                            <label for="clienteId">Cliente</label>
                            <select id="clienteId" name="clienteId" required>
                                <option value="" selected disabled>Seleccione un cliente</option>
                                <option th:each="cliente : ${clientes}" th:value="${cliente.id}"
                                    th:text="${cliente.nombre + ' ' + cliente.apellido + ' - ' + cliente.correo}">
                                </option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label for="tipoHabitacionId">Tipo de habitacion</label>
                            <select id="tipoHabitacionId" name="tipoHabitacionId" required
                                onchange="actualizarCapacidad()">
                                <option value="" selected disabled>Seleccione un tipo</option>
                                <option th:each="tipo : ${tipos}" th:value="${tipo.id}"
                                    th:attr="data-capacidad=${tipo.capacidad}"
                                    th:text="${tipo.nombre + ' - ' + tipo.capacidad + ' pers. - $' + #numbers.formatInteger(tipo.precioPorNoche, 0, 'COMMA')}">
                                </option>
                            </select>
                            <div id="capacidadHint" class="tipo-hint">Seleccione un tipo para ver capacidad maxima</div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-field">
                            <label for="fechaCheckIn">Fecha de entrada</label>
                            <input type="date" id="fechaCheckIn" name="fechaCheckIn" th:min="${hoy}" required>
                        </div>
                        <div class="form-field">
                            <label for="fechaCheckOut">Fecha de salida</label>
                            <input type="date" id="fechaCheckOut" name="fechaCheckOut" th:min="${hoy}" required>
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-field">
                            <label for="numeroHuespedes">Numero de huespedes</label>
                            <input type="number" id="numeroHuespedes" name="numeroHuespedes" min="1" value="1" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/habitaciones/admin(tab='reservas')}" class="btn-cancelar">Cancelar</a>
                        <button type="submit" class="btn-guardar">Guardar Reserva</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function actualizarCapacidad() {
            var selectTipo = document.getElementById('tipoHabitacionId');
            var numeroHuespedes = document.getElementById('numeroHuespedes');
            var capacidadHint = document.getElementById('capacidadHint');

            if (!selectTipo || !selectTipo.selectedOptions.length) return;

            var selectedOption = selectTipo.selectedOptions[0];
            var capacidad = parseInt(selectedOption.getAttribute('data-capacidad') || '1', 10);

            numeroHuespedes.max = capacidad;
            if (parseInt(numeroHuespedes.value || '1', 10) > capacidad) {
                numeroHuespedes.value = capacidad;
            }

            capacidadHint.textContent = 'Capacidad maxima: ' + capacidad + ' huesped(es)';
        }
    </script>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
