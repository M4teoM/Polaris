<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="login-page">
        <div class="login-card">
            <div class="login-card-header">
                <h1>Hotel Polaris</h1>
                <p>Inicia sesión en tu cuenta</p>
            </div>
            <div class="login-card-body">
                <div class="error-msg" th:if="${error}" th:text="${error}"></div>
                <form th:action="@{/login}" method="post">
                    <div class="form-field">
                        <label for="correo">Correo electrónico</label>
                        <input type="email" id="correo" name="correo" placeholder="usuario@correo.com" required>
                    </div>
                    <div class="form-field">
                        <label for="contrasena">Contraseña</label>
                        <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-login">Ingresar</button>
                </form>
                <div class="login-register">
                    <span>¿No tienes cuenta?</span>
                    <a th:href="@{/clientes/nuevo}">Regístrate aquí</a>
                </div>
                <a th:href="@{/habitaciones/admin}" class="btn-lista-clientes">
                    📋 Lista de clientes
                </a>
            </div>
        </div>
    </div>
</body>
</html>
