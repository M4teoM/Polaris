<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Detalle Servicio</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>


<body>
    <!-- NAVBAR que ahora implementamos desde fragmento -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container page-content">
        <div class="detalle">
            <h1 th:text="${servicio.nombre}"></h1>
            <img th:src="${servicio.imagenUrl}">
            <!-- Resumen corto -->
            <p class="service-summary" th:text="${servicio.descripcion}"></p>
            <!-- Descripción detallada (campo usado en el repositorio) -->
            <p class="service-detail" th:text="${servicio.descripcionDetallada}"></p>
            <p class="detalle-precio"th:text="${'$' + #numbers.formatDecimal(servicio.precio, 0, 'POINT', 0, 'COMMA')}"></p>
        </div>
    </div>

    <!-- FOOTER que ahora implementamos desde fragmento -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
