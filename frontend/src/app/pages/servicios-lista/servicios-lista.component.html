<section class="svc-page-hero">
  <div class="svc-page-hero-bg"></div>
  <div class="svc-page-hero-overlay"></div>
  <div class="svc-page-hero-content">
    <span class="svc-page-hero-badge">✦ Experiencias Premium</span>
    <h1 class="svc-page-hero-title">Nuestros Servicios</h1>
    <p class="svc-page-hero-sub">Experiencias personalizadas para elevar cada momento de su estadía</p>
  </div>
</section>

<main style="padding: 60px 5%; background: #f0f0f0; min-height: 600px;">
  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px; max-width: 1200px; margin: 0 auto;">
    <article
      *ngFor="let servicio of serviciosFiltrados"
      style="background: #1B2B44; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; min-height: 380px;">
      <div style="height: 200px; background: #0a1628; flex-shrink: 0;">
        <img [src]="servicio.imagenUrl" [alt]="servicio.nombre"
             style="width: 100%; height: 100%; object-fit: cover; display: block;"
             loading="eager">
      </div>
      <div style="padding: 24px; flex: 1; display: flex; flex-direction: column;">
        <h3 style="color: #ffffff; font-size: 1.3rem; margin: 0 0 8px; font-family: serif;">{{ servicio.nombre }}</h3>
        <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem; margin: 0 0 16px; line-height: 1.5; flex: 1;">{{ servicio.descripcion }}</p>
        <a [routerLink]="['/servicios', servicio.id]"
           style="display: inline-block; background: #D4AF37; color: #0a1628; padding: 10px 20px; border-radius: 8px; font-weight: 600; text-decoration: none; text-align: center;">
          Ver Detalle
        </a>
      </div>
    </article>
  </div>
</main>
