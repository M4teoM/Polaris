<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- HERO -->
    <section class="svc-page-hero">
        <div class="svc-page-hero-bg"></div>
        <div class="svc-page-hero-overlay"></div>
        <div class="svc-page-hero-content">
            <span class="svc-page-hero-badge">&#10022; Experiencias Premium</span>
            <h1 class="svc-page-hero-title">Servicios Excepcionales</h1>
            <p class="svc-page-hero-sub">Cada detalle diseñado a la perfección para una experiencia inolvidable</p>
        </div>
    </section>

    <!-- TARJETAS -->
    <main class="svc-page-main">

        <!-- FILTRO POR CATEGORÍA -->
        <div class="svc-filter-bar">
            <button class="svc-filter-btn svc-filter-active" data-filter="all">Todos</button>
            <button class="svc-filter-btn" th:each="cat : ${categorias}" th:data-filter="${cat}" th:text="${cat}">Categoría</button>
        </div>

        <div class="svc-page-grid">

            <article class="svc-page-card svc-reveal" th:each="servicio, iterStat : ${servicios}"
                     th:data-categoria="${servicio.categoria}"
                     th:styleappend="'--delay:' + ${iterStat.index * 100} + 'ms'">
                <div class="svc-page-card-img">
                    <img th:src="${servicio.imagenUrl}" th:alt="${servicio.nombre}" loading="lazy">
                    <div class="svc-page-card-cat" th:text="${servicio.categoria}">Categoría</div>
                </div>
                <div class="svc-page-card-body">
                    <h3 class="svc-page-card-name" th:text="${servicio.nombre}">Nombre</h3>
                    <p class="svc-page-card-desc" th:text="${servicio.descripcion}">Descripción</p>
                    <div class="svc-page-card-footer">
                        <span class="svc-page-card-price" th:text="'$' + ${#numbers.formatInteger(servicio.precio, 0, 'COMMA')}">$0</span>
                        <a class="svc-page-card-btn" th:href="@{/servicios/{id}(id=${servicio.id})}">Ver Detalle &#8594;</a>
                    </div>
                </div>
            </article>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Scroll reveal
        const cards = document.querySelectorAll('.svc-reveal');
        const obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) { e.target.classList.add('svc-visible'); obs.unobserve(e.target); }
            });
        }, { threshold: 0.1 });
        cards.forEach(function(c) { obs.observe(c); });

        // Filtro por categoría
        const filterBtns = document.querySelectorAll('.svc-filter-btn');
        filterBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                filterBtns.forEach(function(b) { b.classList.remove('svc-filter-active'); });
                btn.classList.add('svc-filter-active');
                var filter = btn.getAttribute('data-filter');
                cards.forEach(function(card) {
                    var cat = card.getAttribute('data-categoria');
                    if (filter === 'all' || cat === filter) {
                        card.style.display = '';
                        card.classList.add('svc-visible');
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });
    });
    </script>

</body>

</html>
