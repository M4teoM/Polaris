<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>


<body>
    <!-- NAVBAR implementao desde fragmento -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <section class="page-section services-table-page">
        <div class="container">
            <div class="section-header">
                <h1 class="section-title">Servicios Excepcionales</h1>
                <p class="section-subtitle">Gestión y consulta de experiencias exclusivas Polaris.</p>
                <div class="services-table-actions">
                    <a class="btn-outline" th:href="@{/servicios/cards}">
                        Ver como Tarjetas
                    </a>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="polaris-table">
                    <thead>
                        <tr>
                            <th>Nombre del Servicio</th>
                            <th>Precio</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="servicio : ${servicios}">
                            <td class="font-bold" th:text="${servicio.nombre}"></td>
                            <td class="price-cell"
                                th:text="${'$' + #numbers.formatDecimal(servicio.precio, 0, 'POINT', 0, 'COMMA')}"></td>
                            <td class="text-center">
                                <a class="btn-table-action" th:href="@{'/servicios/' + ${servicio.id}}">
                                    Ver Detalles
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- FOOTER implementao desde fragmento -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
