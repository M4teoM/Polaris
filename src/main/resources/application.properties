spring.application.name=demo
server.port=8080

# H2
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/polarisdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Datos de prueba
spring.jpa.generate-ddl=true
# Persistente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# Ejecuta scripts SQL de inicialización en cada arranque
spring.sql.init.mode=always
# Evita consultas JPA durante renderizado de vistas
spring.jpa.open-in-view=false

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.format_sql=true

server.error.whitelabel.enabled=false

# ══ NUEVO: JWT ══════════════════════════════════════════════════════════════
app.jwt.secret=polarisHotelSecretKey2024SuperSeguraParaFirmarTokensJWT12345678
app.jwt.expiration-ms=86400000
