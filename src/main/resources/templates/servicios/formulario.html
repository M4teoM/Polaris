<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .form-page {
            min-height: 100vh;
            background: #f4f7fb;
            padding: 120px 0 80px;
        }
        .form-card {
            max-width: 780px; margin: 0 auto;
            background: #fff; border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.09);
            overflow: hidden;
        }
        .form-card-header {
            background: linear-gradient(135deg, #0a1628, #1a2a4a);
            padding: 36px 40px;
        }
        .form-card-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; color: #fff; margin-bottom: 4px;
        }
        .form-card-header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem; color: rgba(255,255,255,0.6);
        }
        .form-card-body { padding: 40px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .form-row.full { grid-template-columns: 1fr; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        .form-field { display: flex; flex-direction: column; gap: 6px; }
        .form-field label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem; font-weight: 600;
            color: #0a1628; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-field input,
        .form-field textarea,
        .form-field select {
            padding: 12px 16px;
            border: 2px solid #e8edf5; border-radius: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 0.9rem;
            color: #0a1628; background: #fafbff;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-field input:focus,
        .form-field textarea:focus,
        .form-field select:focus { border-color: #2ec4b6; background: #fff; }
        .form-field textarea { resize: vertical; min-height: 100px; }
        .form-field .form-hint {
            font-size: 0.72rem; color: #999;
            font-family: 'Montserrat', sans-serif;
        }

        .img-preview {
            width: 100%; height: 200px; border-radius: 10px;
            object-fit: cover; margin-top: 10px;
            display: none; border: 2px solid #e8edf5;
        }

        .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; }
        .btn-guardar {
            background: #2ec4b6; color: #0a1628;
            padding: 13px 32px; border-radius: 10px;
            border: none; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 0.9rem; transition: background 0.3s;
        }
        .btn-guardar:hover { background: #D4AF37; }
        .btn-cancelar {
            background: #f0f4ff; color: #0a1628;
            padding: 13px 32px; border-radius: 10px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif; font-weight: 600;
            font-size: 0.9rem; transition: background 0.3s;
        }
        .btn-cancelar:hover { background: #e0e6f0; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="form-page">
        <div class="form-card">
            <div class="form-card-header">
                <h1 th:text="${servicio.id == null} ? 'Nuevo Servicio' : 'Editar Servicio'">Formulario</h1>
                <p th:text="${servicio.id == null} ? 'Complete los campos para agregar un nuevo servicio' : 'Modifique los campos que desea actualizar'">Subtitulo</p>
            </div>

            <div class="form-card-body">
                <form th:action="${servicio.id == null} ? @{/servicios/nuevo} : @{/servicios/editar/{id}(id=${servicio.id})}"
                      method="post">

                    <div class="form-row">
                        <div class="form-field">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" name="nombre"
                                   th:value="${servicio.nombre}"
                                   placeholder="Ej: Spa Premium" required>
                        </div>
                        <div class="form-field">
                            <label for="categoria">Categor&#237;a</label>
                            <select id="categoria" name="categoria" required>
                                <option value="" disabled th:selected="${servicio.categoria == null}">Seleccionar...</option>
                                <option value="Aventura" th:selected="${servicio.categoria == 'Aventura'}">Aventura</option>
                                <option value="Bienestar" th:selected="${servicio.categoria == 'Bienestar'}">Bienestar</option>
                                <option value="Deportes" th:selected="${servicio.categoria == 'Deportes'}">Deportes</option>
                                <option value="Experiencias" th:selected="${servicio.categoria == 'Experiencias'}">Experiencias</option>
                                <option value="Gastronom&#237;a" th:selected="${servicio.categoria == 'Gastronomía'}">Gastronom&#237;a</option>
                                <option value="Lujo" th:selected="${servicio.categoria == 'Lujo'}">Lujo</option>
                                <option value="Rom&#225;ntico" th:selected="${servicio.categoria == 'Romántico'}">Rom&#225;ntico</option>
                                <option value="Turismo" th:selected="${servicio.categoria == 'Turismo'}">Turismo</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-field">
                            <label for="descripcion">Descripci&#243;n corta</label>
                            <input type="text" id="descripcion" name="descripcion"
                                   th:value="${servicio.descripcion}"
                                   placeholder="Breve descripci&#243;n del servicio" required>
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-field">
                            <label for="descripcionDetallada">Descripci&#243;n detallada</label>
                            <textarea id="descripcionDetallada" name="descripcionDetallada"
                                      placeholder="Descripci&#243;n completa del servicio..."
                                      th:text="${servicio.descripcionDetallada}"></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-field">
                            <label for="precio">Precio ($)</label>
                            <input type="number" id="precio" name="precio"
                                   th:value="${servicio.precio}"
                                   placeholder="180000" min="0" step="1000" required>
                        </div>
                        <div class="form-field">
                            <label for="duracion">Duraci&#243;n</label>
                            <input type="text" id="duracion" name="duracion"
                                   th:value="${servicio.duracion}"
                                   placeholder="Ej: 2 horas">
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-field">
                            <label for="horario">Horario</label>
                            <input type="text" id="horario" name="horario"
                                   th:value="${servicio.horario}"
                                   placeholder="Ej: Todos los d&#237;as de 8:00 AM a 8:00 PM">
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-field">
                            <label for="imagenUrl">URL de Imagen</label>
                            <input type="url" id="imagenUrl" name="imagenUrl"
                                   th:value="${servicio.imagenUrl}"
                                   placeholder="https://images.unsplash.com/..." oninput="previewImg(this.value)">
                        </div>
                    </div>

                    <img id="imgPreview" class="img-preview" alt="Vista previa">

                    <div class="form-row full">
                        <div class="form-field">
                            <label for="incluye">Qu&#233; incluye</label>
                            <textarea id="incluye" name="incluye"
                                      placeholder="Separar cada &#237;tem con | (barra vertical)&#10;Ej: Masaje completo|Aromaterapia|Jacuzzi privado"
                                      th:text="${servicio.incluye}"></textarea>
                            <span class="form-hint">Separe cada &#237;tem con el car&#225;cter | (barra vertical)</span>
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-field">
                            <label for="destacados">Destacados</label>
                            <textarea id="destacados" name="destacados"
                                      placeholder="Separar cada destacado con | (barra vertical)&#10;Ej: Terapeutas certificados|Productos org&#225;nicos"
                                      th:text="${servicio.destacados}"></textarea>
                            <span class="form-hint">Separe cada destacado con el car&#225;cter | (barra vertical)</span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/habitaciones/admin?tab=servicios}" class="btn-cancelar">Cancelar</a>
                        <button type="submit" class="btn-guardar"
                                th:text="${servicio.id == null} ? 'Crear Servicio' : 'Guardar Cambios'">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function previewImg(url) {
            var img = document.getElementById('imgPreview');
            if (url && url.startsWith('http')) {
                img.src = url;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }
        window.addEventListener('load', function() {
            var input = document.getElementById('imagenUrl');
            if (input && input.value) previewImg(input.value);
        });
    </script>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
