<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .perfil-page {
            min-height: 100vh;
            background: var(--color-pearl);
            padding: 120px 0 80px;
        }

        .perfil-hero {
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            padding: 60px 0 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 64px;
        }

        .perfil-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1600&q=80') center/cover;
            opacity: 0.1;
        }

        .perfil-hero-content {
            position: relative;
            z-index: 1;
        }

        .perfil-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--color-aguamarina);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-family: var(--font-display);
            font-size: 2.2rem;
            color: #0a1628;
            font-weight: 700;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .perfil-hero h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--color-white);
            margin-bottom: 6px;
        }

        .perfil-hero p {
            font-family: var(--font-body);
            font-size: 0.88rem;
            color: rgba(255,255,255,0.6);
        }

        .perfil-badge {
            display: inline-block;
            background: rgba(212,175,55,0.2);
            color: #D4AF37;
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 20px;
            font-family: var(--font-body);
            margin-bottom: 16px;
        }

        .perfil-container {
            max-width: 700px;
            margin: -40px auto 0;
            padding: 0 24px 80px;
            position: relative;
            z-index: 2;
        }

        .perfil-card {
            background: var(--color-white);
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        .perfil-card-header {
            background: linear-gradient(135deg, #0a1628, #1a2a4a);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .perfil-card-header h2 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--color-white);
        }

        .perfil-card-header span {
            font-family: var(--font-body);
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
        }

        .perfil-card-body {
            padding: 32px;
        }

        .perfil-field {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 0;
            border-bottom: 1px solid #f0f2f8;
        }

        .perfil-field:last-child {
            border-bottom: none;
        }

        .perfil-field-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--color-aguamarina-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .perfil-field-info {
            flex: 1;
        }

        .perfil-field-label {
            font-family: var(--font-body);
            font-size: 0.72rem;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .perfil-field-value {
            font-family: var(--font-body);
            font-size: 1rem;
            color: #0a1628;
            font-weight: 500;
        }

        .perfil-actions {
            padding: 24px 32px;
            background: #fafbff;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid #f0f2f8;
        }

        .btn-editar-perfil {
            background: var(--color-aguamarina);
            color: #0a1628;
            padding: 11px 28px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.88rem;
            text-decoration: none;
            transition: background 0.3s;
        }

        .btn-editar-perfil:hover {
            background: var(--color-aguamarina-light);
        }

        .btn-cerrar-sesion {
            background: #fff0f0;
            color: #c0392b;
            padding: 11px 28px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.88rem;
            text-decoration: none;
            transition: background 0.3s;
        }

        .btn-cerrar-sesion:hover {
            background: #c0392b;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- Verificación de sesión: si no hay usuario activo, redirige al login -->
    <div th:if="${session.clienteActivo == null}">
        <script>window.location.href = '/login';</script>
    </div>

    <div th:if="${session.clienteActivo != null}">

        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="perfil-hero">
            <div class="perfil-hero-content">
                <span class="perfil-badge">&#9733; Cliente Polaris</span>
                <div class="perfil-avatar"
                     th:text="${#strings.toUpperCase(#strings.substring(session.clienteActivo.nombre, 0, 1))}">
                    S
                </div>
                <h1 th:text="${session.clienteActivo.nombre + ' ' + session.clienteActivo.apellido}">Nombre Apellido</h1>
                <p th:text="${session.clienteActivo.correo}">correo@mail.com</p>
            </div>
        </div>

        <!--Perfil y datos del usuario-->
        <div class="perfil-container">
            <div class="perfil-card">
                <div class="perfil-card-header">
                    <h2>Datos de la cuenta</h2>
                    <span th:text="'ID: ' + ${session.clienteActivo.id}">#1</span>
                </div>
                <div class="perfil-card-body">

                    <div class="perfil-field">
                        <div class="perfil-field-icon">&#128100;</div>
                        <div class="perfil-field-info">
                            <div class="perfil-field-label">Nombre</div>
                            <div class="perfil-field-value" th:text="${session.clienteActivo.nombre}">Nombre</div>
                        </div>
                    </div>

                    <div class="perfil-field">
                        <div class="perfil-field-icon">&#128101;</div>
                        <div class="perfil-field-info">
                            <div class="perfil-field-label">Apellido</div>
                            <div class="perfil-field-value" th:text="${session.clienteActivo.apellido}">Apellido</div>
                        </div>
                    </div>

                    <div class="perfil-field">
                        <div class="perfil-field-icon">&#9993;</div>
                        <div class="perfil-field-info">
                            <div class="perfil-field-label">Correo electr&#243;nico</div>
                            <div class="perfil-field-value" th:text="${session.clienteActivo.correo}">correo@mail.com</div>
                        </div>
                    </div>

                    <div class="perfil-field">
                        <div class="perfil-field-icon">&#128274;</div>
                        <div class="perfil-field-info">
                            <div class="perfil-field-label">Contrase&#241;a</div>
                            <div class="perfil-field-value">••••••••</div>
                        </div>
                    </div>

                </div>
                <div class="perfil-actions">
                    <a th:href="@{/clientes/editar/{id}(id=${session.clienteActivo.id})}" class="btn-editar-perfil">Editar perfil</a>
                    <a th:href="@{/logout}" class="btn-cerrar-sesion">Cerrar sesi&#243;n</a>
                </div>
            </div>

            <!--Modo admin-->
            <div style="
                margin-top: 24px;
                background: var(--color-white);
                border-radius: 20px;
                box-shadow: var(--shadow-xl);
                overflow: hidden;">

                <div style="
                    padding: 20px 32px;
                    border-top: 1px solid #f0f2f8;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;">

                    <div style="
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        font-family: var(--font-body);
                        font-size: 0.88rem;
                        color: #aaa;">
                        <span style="
                            width: 8px; height: 8px;
                            border-radius: 50%;
                            background: var(--color-aguamarina);
                            display: inline-block;">
                        </span>
                        Administracion del sistema
                    </div>

                    <a th:href="@{/clientes/admin}" style="
                        font-family: var(--font-body);
                        font-size: 0.88rem;
                        font-weight: 600;
                        color: #0a1628;
                        padding: 10px 24px;
                        border-radius: 8px;
                        border: 1px solid #e0e4ee;
                        text-decoration: none;
                        transition: all 0.3s;">
                        Modo admin
                    </a>
                </div>
            </div>

        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>

    </div>

</body>
</html>
