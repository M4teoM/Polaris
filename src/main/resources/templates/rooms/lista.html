<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Cabecera operacional -->
<div class="ops-header">
    <div class="container ops-header-inner">
        <div>
            <h1>Habitaciones — Vista Operacional</h1>
            <p>Disponibilidad y estado en tiempo real</p>
        </div>
        <a th:href="@{/habitaciones/admin(tab=rooms)}" class="btn-admin-panel">&#9881; Ir al Panel Admin</a>
    </div>
</div>

<div class="container">

    <!-- Resumen por estado -->
    <div class="ops-summary">
        <div class="summary-card disponible">
            <div class="s-num" id="cnt-disponible">0</div>
            <div class="s-label">Disponibles</div>
        </div>
        <div class="summary-card ocupada">
            <div class="s-num" id="cnt-ocupada">0</div>
            <div class="s-label">Ocupadas</div>
        </div>
        <div class="summary-card mant">
            <div class="s-num" id="cnt-mant">0</div>
            <div class="s-label">Mantenimiento</div>
        </div>
    </div>

    <!-- Filtros rápidos -->
    <div class="ops-filters">
        <span>Filtrar:</span>
        <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
        <button class="filter-btn f-disp" onclick="filtrar('Disponible', this)">Disponibles</button>
        <button class="filter-btn f-ocup" onclick="filtrar('Ocupada', this)">Ocupadas</button>
        <button class="filter-btn f-mant" onclick="filtrar('Mantenimiento', this)">Mantenimiento</button>
    </div>

    <!-- Tabla operacional -->
    <div class="ops-table-wrap">
        <table class="ops-table" id="roomsTable">
            <thead>
            <tr>
                <th>N&#250;m.</th>
                <th>Piso</th>
                <th>Tipo</th>
                <th>Cama</th>
                <th>Capacidad</th>
                <th>Precio/noche</th>
                <th>Estado</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="room : ${rooms}" th:attr="data-estado=${room.estado}">
                <td class="num" th:text="${room.numero}">101</td>
                <td th:text="'Piso ' + ${room.piso}">Piso 1</td>
                <td>
                            <span class="tipo-chip"
                                  th:text="${room.tipoHabitacion != null ? room.tipoHabitacion.nombre : '—'}">—</span>
                </td>
                <td th:text="${room.tipoHabitacion != null ? room.tipoHabitacion.tipoCama : '—'}">—</td>
                <td th:text="${room.tipoHabitacion != null ? room.tipoHabitacion.capacidad + ' pers.' : '—'}">—</td>
                <td th:text="${room.tipoHabitacion != null ? '$' + #numbers.formatInteger(room.tipoHabitacion.precioPorNoche, 0, 'COMMA') : '—'}">—</td>
                <td>
                            <span class="estado-pill"
                                  th:classappend="'estado-' + ${room.estado}"
                                  th:text="${room.estado}">Estado</span>
                </td>
                <td>
                    <a class="btn-detalle" th:href="@{/rooms/{id}(id=${room.id})}">Ver detalle</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Contadores por estado
    document.addEventListener('DOMContentLoaded', function() {
        var rows = document.querySelectorAll('#roomsTable tbody tr');
        var cnt = { Disponible: 0, Ocupada: 0, Mantenimiento: 0 };
        rows.forEach(function(r) { cnt[r.dataset.estado]++; });
        document.getElementById('cnt-disponible').textContent = cnt.Disponible;
        document.getElementById('cnt-ocupada').textContent    = cnt.Ocupada;
        document.getElementById('cnt-mant').textContent       = cnt.Mantenimiento;
    });

    // Filtro por estado
    function filtrar(estado, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('#roomsTable tbody tr').forEach(function(r) {
            r.style.display = (estado === 'todos' || r.dataset.estado === estado) ? '' : 'none';
        });
    }
</script>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
