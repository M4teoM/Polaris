<div class="admin-wrap">
    <section class="admin-panel">
        <h1>CRUD Habitaciones</h1>
        <p>Gestión rápida de habitaciones físicas (frontend).</p>

        <div class="alert ok" *ngIf="mensajeExito">{{ mensajeExito }}</div>
        <div class="alert error" *ngIf="errorGeneral">{{ errorGeneral }}</div>

        <div class="form-grid">
            <input [(ngModel)]="form.numero" placeholder="Número" />
            <input [(ngModel)]="form.piso" type="number" min="1" placeholder="Piso" />
            <input [(ngModel)]="form.tipoHabitacionId" type="number" min="1" placeholder="Tipo ID" />
            <select [(ngModel)]="form.estado">
                <option value="DISPONIBLE">DISPONIBLE</option>
                <option value="OCUPADA">OCUPADA</option>
                <option value="MANTENIMIENTO">MANTENIMIENTO</option>
                <option value="LIMPIEZA">LIMPIEZA</option>
            </select>
        </div>

        <div class="actions">
            <button class="btn primary" (click)="guardar()">{{ editandoId ? 'Guardar cambios' : 'Crear habitación'
                }}</button>
            <button *ngIf="editandoId" class="btn" (click)="cancelar()">Cancelar</button>
        </div>
    </section>

    <section class="admin-panel">
        <h2>Listado</h2>
        <div class="table-wrap" *ngIf="habitaciones.length; else sinDatos">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Número</th>
                        <th>Piso</th>
                        <th>Estado</th>
                        <th>Tipo ID</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let h of habitaciones">
                        <td>{{ h.id }}</td>
                        <td>{{ h.numero }}</td>
                        <td>{{ h.piso }}</td>
                        <td>{{ h.estado }}</td>
                        <td>{{ h.tipoHabitacionId }}</td>
                        <td class="row-actions">
                            <button class="btn" (click)="editar(h)">Editar</button>
                            <button class="btn danger" (click)="eliminar(h.id)">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <ng-template #sinDatos>
            <p>No hay habitaciones para mostrar.</p>
        </ng-template>
    </section>
</div>
