<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Hotel Polaris</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="error-container">
        <div class="error-icon" th:text="${icono}">⚠️</div>
        <div class="error-code" th:text="${codigo}">500</div>
        <h1 class="error-titulo" th:text="${titulo}">Error</h1>
        <p class="error-descripcion" th:text="${descripcion}">Algo salió mal.</p>
        <div class="error-uri" th:if="${uri}" th:text="'Ruta: ' + ${uri}"></div>
        <div>
            <a href="javascript:history.back()" class="btn-outline">← Volver</a>
            <a th:href="@{/}" class="btn-volver">🏠 Ir al inicio</a>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
