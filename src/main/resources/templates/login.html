<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden; width: 100%; max-width: 420px;
        }
        .login-card-header {
            background: linear-gradient(135deg, #0a1628, #1a2a4a);
            padding: 36px 40px; text-align: center;
        }
        .login-card-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; color: #fff; margin-bottom: 4px;
        }
        .login-card-header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.82rem; color: rgba(255,255,255,0.6);
        }
        .login-card-body { padding: 36px 40px; }
        .form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .form-field label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem; font-weight: 600;
            color: #0a1628; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-field input {
            padding: 12px 16px;
            border: 2px solid #e8edf5; border-radius: 10px;
            font-family: 'Montserrat', sans-serif; font-size: 0.9rem;
            color: #0a1628; background: #fafbff;
            transition: border-color 0.3s; outline: none;
        }
        .form-field input:focus { border-color: #2ec4b6; background: #fff; }
        .error-msg {
            color: #c0392b; font-family: 'Montserrat', sans-serif;
            font-size: 0.83rem; font-weight: 600;
            background: #fff0f0; border-radius: 8px;
            padding: 10px 14px; margin-bottom: 18px;
            border-left: 3px solid #c0392b;
        }
        .btn-login {
            width: 100%; background: #2ec4b6; color: #0a1628;
            padding: 13px; border-radius: 10px; border: none;
            cursor: pointer; font-family: 'Montserrat', sans-serif;
            font-weight: 700; font-size: 0.95rem; transition: background 0.3s;
        }
        .btn-login:hover { background: #D4AF37; }
    </style>
</head>
<body>
    <!--Formulario para iniciar sesion-->
    <div class="login-page">
        <div class="login-card">
            <div class="login-card-header">
                <h1>Hotel Polaris</h1>
                <p>Inicia sesi&#243;n en tu cuenta</p>
            </div>
            <div class="login-card-body">
                <div class="error-msg" th:if="${error}" th:text="${error}"></div>
                <form th:action="@{/login}" method="post">
                    <div class="form-field">
                        <label for="correo">Correo electr&#243;nico</label>
                        <input type="email" id="correo" name="correo" placeholder="usuario@correo.com" required>
                    </div>
                    <div class="form-field">
                        <label for="contrasena">Contrase&#241;a</label>
                        <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-login">Ingresar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
