# Configuración exclusiva para tests E2E y de integración
# Se activa con @ActiveProfiles("test")

server.port=8080

# H2 en memoria — se reinicia entre tests con @DirtiesContext
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:polaristest;DB_CLOSE_ON_EXIT=FALSE;MODE=LEGACY
spring.datasource.username=sa
spring.datasource.password=

# JPA — recrear esquema en cada arranque del contexto
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.open-in-view=false

# Permite que DataInitializer corra y siembre datos en cada test
spring.main.allow-bean-definition-overriding=true