<div class="crear-wrap">
  <h1>Nueva reserva</h1>
  <a [routerLink]="returnUrl">← Volver</a>

  <div class="error" *ngIf="error">{{ error }}</div>
  <div class="ok" *ngIf="ok">{{ ok }}</div>

  <div class="crear-layout">
    <form class="card" (ngSubmit)="crear()">
      <label *ngIf="!authService.isCliente(); else clienteSesionTpl">
        Cliente
        <select [(ngModel)]="form.clienteId" name="clienteId" required>
          <option [ngValue]="0">Selecciona un cliente</option>
          <option *ngFor="let c of clientes" [ngValue]="c.id">
            {{ c.nombre }} {{ c.apellido }} ({{ c.correo }})
          </option>
        </select>
      </label>
      <ng-template #clienteSesionTpl>
        <label>
          Cliente
          <input
            type="text"
            [value]="(clienteSesion?.nombre || '') + ' ' + (clienteSesion?.apellido || '') + ' (' + (clienteSesion?.correo || '') + ')'"
            readonly
          />
        </label>
      </ng-template>

      <label>
        Tipo de habitación
        <select [(ngModel)]="form.tipoHabitacionId" name="tipoHabitacionId" required>
          <option [ngValue]="0">Selecciona un tipo</option>
          <option *ngFor="let t of tipos" [ngValue]="t.id">
            {{ t.nombre }} - Capacidad: {{ t.capacidad }}
          </option>
        </select>
      </label>

      <label>
        Fecha check-in
        <input type="date" [(ngModel)]="form.fechaCheckIn" name="fechaCheckIn" required />
      </label>

      <label>
        Fecha check-out
        <input type="date" [(ngModel)]="form.fechaCheckOut" name="fechaCheckOut" required />
      </label>

      <label>
        Número de huéspedes
        <input
          type="number"
          min="1"
          [(ngModel)]="form.numeroHuespedes"
          name="numeroHuespedes"
          required
        />
      </label>

      <button class="btn-primary" type="submit" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : 'Crear reserva' }}
      </button>
    </form>

    <aside class="tipos-panel" *ngIf="tipos.length > 0">
      <h2>Tipos de habitación</h2>
      <div class="tipo-item" *ngFor="let t of tipos" [class.selected]="t.id === form.tipoHabitacionId">
        <div class="tipo-item-head">
          <strong>{{ t.nombre }}</strong>
          <span>Cap: {{ t.capacidad }}</span>
        </div>
        <p>{{ t.descripcion }}</p>
        <small>${{ t.precioPorNoche | number:'1.0-0' }} / noche</small>
      </div>
    </aside>
  </div>
</div>
