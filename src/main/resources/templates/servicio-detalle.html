<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${servicio.nombre} + ' | Hotel Polaris'">Detalle Servicio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- HERO CON IMAGEN DEL SERVICIO -->
    <section class="svc-det-hero">
        <div class="svc-det-hero-bg" th:style="'background-image:url(' + ${servicio.imagenUrl} + ')'"></div>
        <div class="svc-det-hero-overlay"></div>
        <div class="svc-det-hero-content">
            <h1 class="svc-det-hero-title" th:text="${servicio.nombre}">Servicio</h1>
        </div>
    </section>

    <!-- DETALLE -->
    <div class="svc-det-wrapper">
        <div class="svc-det-card">
            <div class="svc-det-grid">
                <div class="svc-det-img-col">
                    <div class="svc-det-img-frame">
                        <img th:src="${servicio.imagenUrl}" th:alt="${servicio.nombre}">
                    </div>
                </div>
                <div class="svc-det-info-col">
                    <div class="svc-det-badge">Servicio Premium</div>
                    <h2 class="svc-det-name" th:text="${servicio.nombre}">Nombre</h2>
                    <p class="svc-det-desc-short" th:text="${servicio.descripcion}">Descripción</p>
                    <div class="svc-det-divider"></div>
                    <p class="svc-det-desc-full" th:text="${servicio.descripcionDetallada}">Descripción detallada</p>
                    <div class="svc-det-bottom">
                        <span class="svc-det-price" th:text="${'$' + #numbers.formatDecimal(servicio.precio, 0, 'POINT', 0, 'COMMA')}">$0</span>
                        <a class="svc-det-cta" href="#">Reservar este Servicio</a>
                    </div>
                </div>
            </div>
        </div>
        <div style="text-align:center; margin-top:2rem;">
            <a th:href="@{/servicios/cards}" class="svc-det-back">&#8592; Volver a Servicios</a>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var card = document.querySelector('.svc-det-card');
        if (card) setTimeout(function() { card.classList.add('svc-det-visible'); }, 100);
    });
    </script>
</body>

</html>
