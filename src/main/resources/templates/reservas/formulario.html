<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .form-page { min-height:100vh; background:#f4f7fb; padding:120px 0 80px; }
        .form-card {
            max-width:680px; margin:0 auto; background:#fff;
            border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,0.09); overflow:hidden;
        }
        .form-card-header { background:linear-gradient(135deg,#0a1628,#1a2a4a); padding:36px 40px; }
        .form-card-header h1 { font-family:'Playfair Display',serif; font-size:1.8rem; color:#fff; margin-bottom:4px; }
        .form-card-header p  { font-family:'Montserrat',sans-serif; font-size:0.85rem; color:rgba(255,255,255,0.6); }

        .tipo-resumen {
            display:flex; gap:16px; align-items:center;
            background:#f8faff; border-radius:12px; padding:16px;
            margin-bottom:28px; border:1px solid #e0e6f4;
        }
        .tipo-resumen img { width:90px; height:64px; object-fit:cover; border-radius:8px; flex-shrink:0; }
        .tipo-resumen-nombre { font-family:'Playfair Display',serif; font-size:1rem; color:#0a1628; }
        .tipo-resumen-meta   { font-family:'Montserrat',sans-serif; font-size:0.78rem; color:#888; margin-top:4px; }
        .tipo-resumen-precio { font-family:'Montserrat',sans-serif; font-size:0.9rem; color:#2ec4b6; font-weight:700; white-space:nowrap; }

        .form-card-body { padding:36px 40px; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
        .form-row.full { grid-template-columns:1fr; }
        @media(max-width:560px){ .form-row { grid-template-columns:1fr; } }

        .form-field { display:flex; flex-direction:column; gap:6px; }
        .form-field label { font-family:'Montserrat',sans-serif; font-size:0.78rem; font-weight:600; color:#0a1628; text-transform:uppercase; letter-spacing:0.5px; }
        .form-field input, .form-field select {
            padding:12px 16px; border:2px solid #e8edf5; border-radius:10px;
            font-family:'Montserrat',sans-serif; font-size:0.9rem; color:#0a1628;
            background:#fafbff; transition:border-color 0.3s; outline:none;
        }
        .form-field input:focus, .form-field select:focus { border-color:#2ec4b6; background:#fff; }

        .total-box {
            background:#f0fdfc; border:1px solid #2ec4b6; border-radius:12px;
            padding:16px 20px; margin:24px 0;
            display:flex; justify-content:space-between; align-items:center;
        }
        .total-box span   { font-family:'Montserrat',sans-serif; font-size:0.85rem; color:#555; }
        .total-box strong { font-family:'Playfair Display',serif; font-size:1.5rem; color:#0a1628; }

        .form-actions { display:flex; gap:12px; justify-content:flex-end; }
        .btn-guardar {
            background:#D4AF37; color:#0a1628; padding:13px 32px; border-radius:10px;
            border:none; cursor:pointer; font-family:'Montserrat',sans-serif;
            font-weight:700; font-size:0.9rem; transition:background 0.3s;
        }
        .btn-guardar:hover { background:#2ec4b6; }
        .btn-cancelar {
            background:#f0f4ff; color:#0a1628; padding:13px 32px; border-radius:10px;
            text-decoration:none; font-family:'Montserrat',sans-serif;
            font-weight:600; font-size:0.9rem; transition:background 0.3s;
        }
        .btn-cancelar:hover { background:#e0e6f0; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="form-page">
    <div class="form-card">
        <div class="form-card-header">
            <h1>Confirmar Reserva</h1>
            <p>Complete los datos — se le asignar&#225; la primera habitaci&#243;n disponible de este tipo</p>
        </div>
        <div class="form-card-body">

            <!-- Resumen del tipo de habitación -->
            <div class="tipo-resumen">
                <img th:src="${tipo.imagenUrl}" th:alt="${tipo.nombre}">
                <div style="flex:1">
                    <div class="tipo-resumen-nombre" th:text="${tipo.nombre}"></div>
                    <div class="tipo-resumen-meta"
                         th:text="${tipo.tipoCama} + '  ·  ' + ${tipo.metrosCuadrados} + ' m²  ·  Máx. ' + ${tipo.capacidad} + ' personas'">
                    </div>
                </div>
                <div class="tipo-resumen-precio"
                     th:text="'$' + ${#numbers.formatInteger(tipo.precioPorNoche, 0, 'COMMA')} + '/noche'">
                </div>
            </div>

            <form th:action="@{/reservas/nueva}" method="post">
                <input type="hidden" name="tipoHabitacionId" th:value="${tipo.id}">
                <input type="hidden" name="clienteId"        th:value="${clienteId}">

                <div class="form-row">
                    <div class="form-field">
                        <label for="fechaCheckIn">Fecha de entrada</label>
                        <input type="date" id="fechaCheckIn" name="fechaCheckIn"
                               th:min="${hoy}" required onchange="calcularTotal()">
                    </div>
                    <div class="form-field">
                        <label for="fechaCheckOut">Fecha de salida</label>
                        <input type="date" id="fechaCheckOut" name="fechaCheckOut"
                               th:min="${hoy}" required onchange="calcularTotal()">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-field">
                        <label for="numeroHuespedes">N&#250;mero de hu&#233;spedes</label>
                        <select id="numeroHuespedes" name="numeroHuespedes" required>
                            <option th:each="i : ${#numbers.sequence(1, tipo.capacidad)}"
                                    th:value="${i}"
                                    th:text="${i} + (${i} == 1 ? ' huésped' : ' huéspedes')">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="total-box">
                    <span id="totalLabel">Seleccione las fechas para ver el total</span>
                    <strong id="totalValor"></strong>
                </div>

                <div class="form-actions">
                    <a th:href="@{/habitaciones/{id}(id=${tipo.id}, clienteId=${clienteId})}"
                       class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-guardar">Confirmar Reserva</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
    var precioPorNoche = [[${tipo.precioPorNoche}]];

    function calcularTotal() {
        var checkIn  = document.getElementById('fechaCheckIn').value;
        var checkOut = document.getElementById('fechaCheckOut').value;
        if (!checkIn || !checkOut) return;
        var dias = (new Date(checkOut) - new Date(checkIn)) / (1000 * 60 * 60 * 24);
        if (dias <= 0) {
            document.getElementById('totalLabel').textContent = 'La fecha de salida debe ser posterior';
            document.getElementById('totalValor').textContent = '';
            return;
        }
        document.getElementById('totalLabel').textContent = dias + (dias === 1 ? ' noche' : ' noches');
        document.getElementById('totalValor').textContent =
            '$' + (dias * precioPorNoche).toLocaleString('es-CO', { maximumFractionDigits: 0 });
    }
</script>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
