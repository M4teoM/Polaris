<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Perfil Cliente | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>

        /* ===== HERO ===== */
        .perfil-hero {
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            padding: 60px 0 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 64px;
        }

        .perfil-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1600&q=80') center/cover;
            opacity: 0.1;
        }

        .perfil-hero-content {
            position: relative;
            z-index: 1;
        }

        .perfil-badge {
            display: inline-block;
            background: rgba(212,175,55,0.2);
            color: #D4AF37;
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 20px;
            font-family: var(--font-body);
            margin-bottom: 16px;
        }

        .perfil-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--color-aguamarina);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-family: var(--font-display);
            font-size: 2.2rem;
            color: #0a1628;
            font-weight: 700;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .perfil-hero h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--color-white);
            margin-bottom: 6px;
        }

        .perfil-hero p {
            font-family: var(--font-body);
            font-size: 0.88rem;
            color: rgba(255,255,255,0.6);
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .perfil-container {
            max-width: 700px;
            margin: -40px auto 0;
            padding: 0 24px 80px;
            position: relative;
            z-index: 2;
        }

        /* ===== CARD DE DATOS ===== */
        .perfil-card {
            background: var(--color-white);
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        .perfil-card-header {
            background: linear-gradient(135deg, #0a1628, #1a2a4a);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .perfil-card-header h2 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--color-white);
        }

        .perfil-card-header span {
            font-family: var(--font-body);
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
        }

        .perfil-card-body {
            padding: 32px;
        }

        /* ===== CAMPOS ===== */
        .perfil-field {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 0;
            border-bottom: 1px solid #f0f2f8;
        }

        .perfil-field:last-child {
            border-bottom: none;
        }

        .perfil-field-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--color-aguamarina-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .perfil-field-info { flex: 1; }

        .perfil-field-label {
            font-family: var(--font-body);
            font-size: 0.72rem;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .perfil-field-value {
            font-family: var(--font-body);
            font-size: 1rem;
            color: #0a1628;
            font-weight: 500;
        }

        /* ===== ACCIONES ===== */
        .perfil-actions {
            padding: 24px 32px;
            background: #fafbff;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid #f0f2f8;
        }

        .btn-volver {
            background: #f0f4ff;
            color: #0a1628;
            padding: 11px 28px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.88rem;
            text-decoration: none;
            transition: background 0.3s;
        }

        .btn-volver:hover { background: #e0e6f0; }

        .btn-editar-perfil {
            background: var(--color-aguamarina);
            color: #0a1628;
            padding: 11px 28px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.88rem;
            text-decoration: none;
            transition: background 0.3s;
        }

        .btn-editar-perfil:hover { background: var(--color-aguamarina-light); }

        .btn-eliminar-perfil {
            background: #fff0f0;
            color: #c0392b;
            padding: 11px 28px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.88rem;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-eliminar-perfil:hover { background: #c0392b; color: #fff; }

    </style>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Hero con datos del cliente -->
    <div class="perfil-hero">
        <div class="perfil-hero-content">
            <span class="perfil-badge">&#9733; Cliente Polaris</span>
            <div class="perfil-avatar"
                 th:text="${#strings.toUpperCase(#strings.substring(cliente.nombre, 0, 1))}">
                U
            </div>
            <h1 th:text="${cliente.nombre + ' ' + cliente.apellido}">Nombre Apellido</h1>
            <p th:text="${cliente.correo}">correo@mail.com</p>
        </div>
    </div>

    <div class="perfil-container">

        <!-- Card de datos de la cuenta -->
        <div class="perfil-card">
            <div class="perfil-card-header">
                <h2>Datos de la cuenta</h2>
                <span th:text="'ID: ' + ${cliente.id}">#1</span>
            </div>
            <div class="perfil-card-body">

                <div class="perfil-field">
                    <div class="perfil-field-icon">&#128100;</div>
                    <div class="perfil-field-info">
                        <div class="perfil-field-label">Nombre</div>
                        <div class="perfil-field-value" th:text="${cliente.nombre}">Nombre</div>
                    </div>
                </div>

                <div class="perfil-field">
                    <div class="perfil-field-icon">&#128101;</div>
                    <div class="perfil-field-info">
                        <div class="perfil-field-label">Apellido</div>
                        <div class="perfil-field-value" th:text="${cliente.apellido}">Apellido</div>
                    </div>
                </div>

                <div class="perfil-field">
                    <div class="perfil-field-icon">&#9993;</div>
                    <div class="perfil-field-info">
                        <div class="perfil-field-label">Correo electr&#243;nico</div>
                        <div class="perfil-field-value" th:text="${cliente.correo}">correo@mail.com</div>
                    </div>
                </div>

                <div class="perfil-field">
                    <div class="perfil-field-icon">&#128274;</div>
                    <div class="perfil-field-info">
                        <div class="perfil-field-label">Contrase&#241;a</div>
                        <div class="perfil-field-value">••••••••</div>
                    </div>
                </div>

            </div>
            <div class="perfil-actions">
                <a th:href="@{/}" class="btn-volver">&#8592; Volver al inicio</a>
                <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn-editar-perfil">Editar</a>
                <form th:action="@{/clientes/eliminar/{id}(id=${cliente.id})}" method="post" style="margin:0;">
                    <button type="submit" class="btn-eliminar-perfil"
                            onclick="return confirm('&#191;Eliminar esta cuenta?')">Eliminar cuenta</button>
                </form>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
