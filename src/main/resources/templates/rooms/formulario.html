<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaci&#243;n | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">


</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="form-page">
        <div class="form-card">
            <div class="form-card-header">
                <h1 th:text="${room.id == null} ? 'Nueva Habitaci&#243;n' : 'Editar Habitaci&#243;n'">Formulario</h1>
                <p th:text="${room.id == null} ? 'Complete los campos para registrar una nueva habitaci&#243;n' : 'Modifique los campos que desea actualizar'">Subt&#237;tulo</p>
            </div>

            <div class="form-card-body">
                <form th:action="${room.id == null} ? @{/rooms/nueva} : @{/rooms/editar/{id}(id=${room.id})}"
                      method="post">

                    <div class="form-row">
                        <div class="form-field">
                            <label for="numero">N&#250;mero de Habitaci&#243;n</label>
                            <input type="text" id="numero" name="numero"
                                   th:value="${room.numero}"
                                   placeholder="Ej: 101, 205B" required>
                        </div>
                        <div class="form-field">
                            <label for="piso">Piso</label>
                            <input type="number" id="piso" name="piso"
                                   th:value="${room.piso}"
                                   placeholder="1" min="1" max="50" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-field">
                            <label for="estado">Estado</label>
                            <select id="estado" name="estado" required>
                                <option value="Disponible"
                                        th:selected="${room.estado == 'Disponible'}">Disponible</option>
                                <option value="Ocupada"
                                        th:selected="${room.estado == 'Ocupada'}">Ocupada</option>
                                <option value="Mantenimiento"
                                        th:selected="${room.estado == 'Mantenimiento'}">Mantenimiento</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="tipoHabitacionId">Tipo de Habitaci&#243;n</label>
                            <select id="tipoHabitacionId" name="tipoHabitacionId"
                                    onchange="mostrarPreview(this)" required>
                                <option value="">-- Seleccione un tipo --</option>
                                <option th:each="tipo : ${tipos}"
                                        th:value="${tipo.id}"
                                        th:text="${tipo.nombre}"
                                        th:selected="${room.tipoHabitacionId != null and room.tipoHabitacionId == tipo.id}"
                                        th:attr="data-img=${tipo.imagenUrl},
                                                 data-m2=${tipo.metrosCuadrados},
                                                 data-cap=${tipo.capacidad},
                                                 data-cama=${tipo.tipoCama},
                                                 data-precio=${'$' + #numbers.formatInteger(tipo.precioPorNoche, 0, 'COMMA')}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <!-- Preview del tipo seleccionado -->
                    <div class="form-row full" style="margin-bottom:24px;">
                        <div id="tipoPreview" class="tipo-preview">
                            <img id="previewImg" src="" alt="preview">
                            <div class="tipo-preview-info">
                                <div class="tipo-preview-nombre" id="previewNombre"></div>
                                <div class="tipo-preview-meta">
                                    <span id="previewM2"></span>
                                    <span id="previewCap"></span>
                                    <span id="previewCama"></span>
                                </div>
                                <div class="tipo-preview-precio" id="previewPrecio"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/rooms/admin}" class="btn-cancelar">Cancelar</a>
                        <button type="submit" class="btn-guardar"
                                th:text="${room.id == null} ? 'Crear Habitaci&#243;n' : 'Guardar Cambios'">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function mostrarPreview(select) {
            var opt = select.options[select.selectedIndex];
            var preview = document.getElementById('tipoPreview');
            if (!opt.value) {
                preview.classList.remove('visible');
                return;
            }
            document.getElementById('previewImg').src      = opt.getAttribute('data-img') || '';
            document.getElementById('previewNombre').textContent = opt.text;
            document.getElementById('previewM2').textContent    = opt.getAttribute('data-m2')  + ' m²';
            document.getElementById('previewCap').textContent   = opt.getAttribute('data-cap') + ' personas';
            document.getElementById('previewCama').textContent  = opt.getAttribute('data-cama');
            document.getElementById('previewPrecio').textContent = opt.getAttribute('data-precio') + '/noche';
            preview.classList.add('visible');
        }
        // Mostrar preview al cargar si ya hay tipo seleccionado (edición)
        window.addEventListener('load', function() {
            var sel = document.getElementById('tipoHabitacionId');
            if (sel && sel.value) mostrarPreview(sel);
        });
    </script>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
