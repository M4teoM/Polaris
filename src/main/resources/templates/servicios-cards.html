<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- HERO MINI -->
    <section class="cards-hero page-content">
        <div class="cards-hero-overlay"></div>
        <div class="cards-hero-content">
            <h1 class="cards-hero-title">Servicios Excepcionales</h1>
            <p class="cards-hero-subtitle">Cada detalle diseñado a la perfección para una experiencia inolvidable</p>
        </div>
    </section>

    <!-- TARJETAS -->
    <main style="margin-top:50px; margin-bottom:80px;">

        <!-- grid forzado inline para que no lo pise ninguna regla del CSS anterior -->
        <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:30px;">

            <div class="card polaris-card" th:each="servicio : ${servicios}">
                <div style="overflow:hidden; height:220px;">
                    <img th:src="${servicio.imagenUrl}" th:alt="${servicio.nombre}"
                        style="width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease;">
                </div>
                <div class="card-body">
                    <span class="polaris-categoria" th:text="${servicio.categoria}">Categoria</span>
                    <p class="card-title" th:text="${servicio.nombre}">Nombre</p>
                    <p class="card-description" th:text="${servicio.descripcion}">Descripcion</p>
                    <p class="card-price" th:text="'$' + ${#numbers.formatInteger(servicio.precio, 0, 'COMMA')}">$0</p>
                    <a class="btn-polaris-ver" th:href="@{/servicios/{id}(id=${servicio.id})}">Ver Detalle &#8594;</a>
                </div>
            </div>

        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
