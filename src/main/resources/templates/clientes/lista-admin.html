<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Clientes | Hotel Polaris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .admin-hero {
            height: 220px;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            display: flex; align-items: center; justify-content: center;
            text-align: center; position: relative; overflow: hidden;
            margin-top: 80px;
        }
        .admin-hero-badge {
            display: inline-block; background: rgba(212,175,55,0.2);
            color: #D4AF37; font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase; padding: 4px 14px; border-radius: 20px;
            font-family: 'Montserrat', sans-serif; margin-bottom: 12px;
        }
        .admin-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; color: #fff;
        }
        .admin-toolbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 32px 0 20px;
        }
        .admin-toolbar h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem; color: #0a1628;
        }
        .admin-toolbar span {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem; color: #888;
        }
        .btn-nuevo {
            background: #2ec4b6; color: #0a1628;
            padding: 11px 24px; border-radius: 8px;
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            text-decoration: none; font-size: 0.88rem; transition: background 0.3s;
        }
        .btn-nuevo:hover { background: #D4AF37; }
        .clientes-table {
            width: 100%; border-collapse: collapse;
            background: #fff; border-radius: 14px;
            overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.07);
            margin-bottom: 80px;
        }
        .clientes-table thead { background: #0a1628; color: #fff; }
        .clientes-table th {
            padding: 14px 20px; text-align: left;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .clientes-table td {
            padding: 14px 20px; border-bottom: 1px solid #f0f2f8;
            font-family: 'Montserrat', sans-serif; font-size: 0.88rem; color: #333;
        }
        .clientes-table tr:last-child td { border-bottom: none; }
        .clientes-table tr:hover td { background: #fafbff; }
        .td-actions { display: flex; gap: 8px; }
        .btn-editar {
            background: #fff8e6; color: #a07800;
            padding: 7px 16px; border-radius: 6px;
            text-decoration: none; font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem; font-weight: 600; transition: background 0.3s;
        }
        .btn-editar:hover { background: #D4AF37; color: #fff; }
        .btn-eliminar {
            background: #fff0f0; color: #c0392b;
            padding: 7px 16px; border-radius: 6px;
            border: none; cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem; font-weight: 600; transition: background 0.3s;
        }
        .btn-eliminar:hover { background: #c0392b; color: #fff; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="admin-hero">
        <div style="position:relative;z-index:1;text-align:center;">
            <span class="admin-hero-badge">&#9881; Panel Administrativo</span>
            <h1>Gesti&#243;n de Clientes</h1>
        </div>
    </div>

    <!--Lista de clientes-->
    <div class="container">
        <div class="admin-toolbar">
            <div>
                <h2>Clientes Registrados</h2>
                <span th:text="${#lists.size(clientes)} + ' clientes registrados'">0 clientes</span>
            </div>
            <a th:href="@{/clientes/nuevo}" class="btn-nuevo">+ Nuevo Cliente</a>
        </div>

        <table class="clientes-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Correo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cliente : ${clientes}">
                    <td th:text="${cliente.id}">1</td>
                    <td th:text="${cliente.nombre}">Nombre</td>
                    <td th:text="${cliente.apellido}">Apellido</td>
                    <td th:text="${cliente.correo}">correo@mail.com</td>
                    <td>
                        <div class="td-actions">
                            <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn-editar">Editar</a>
                            <form th:action="@{/clientes/eliminar/{id}(id=${cliente.id})}" method="post" style="margin:0;">
                                <button type="submit" class="btn-eliminar"
                                        onclick="return confirm('&#191;Eliminar este cliente?')">Eliminar</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
